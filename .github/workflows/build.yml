name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    outputs:
      marketing_version: ${{ steps.version.outputs.marketing_version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Pinned to a fixed version so new SwiftLint rules can't suddenly break CI (--strict),
      # and checksum-verified so a swapped release asset cannot run in CI unnoticed.
      - name: SwiftLint
        env:
          SWIFTLINT_VERSION: 0.65.0
          SWIFTLINT_SHA256: d6cb0aa7a2f5f1ef306fc9e37bcb54dc9a26facc8f7784ac0c3dd3eccf5c6ba6
        run: |
          curl -fsSL -o swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          echo "${SWIFTLINT_SHA256}  swiftlint.zip" | shasum -a 256 -c -
          unzip -o -q swiftlint.zip -d swiftlint-bin
          ./swiftlint-bin/swiftlint lint --strict --reporter github-actions-logging

      - name: Test
        run: |
          xcodebuild test -project PromptQuittung.xcodeproj \
            -scheme PromptQuittung \
            CODE_SIGN_IDENTITY="-"

      # Ad-hoc signing ("-") instead of disabling signing entirely: a fully unsigned
      # binary is rejected by the notification daemon (UNErrorDomain code 1), so the
      # app builds and launches but can never deliver a single notification.
      - name: Build (ad-hoc signed)
        run: |
          xcodebuild -project PromptQuittung.xcodeproj \
            -target PromptQuittung \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            build

      - name: Read marketing version
        id: version
        run: |
          MARKETING_VERSION=$(xcodebuild -project PromptQuittung.xcodeproj \
            -target PromptQuittung -configuration Release -showBuildSettings 2>/dev/null \
            | awk '$1 == "MARKETING_VERSION" {print $3; exit}')
          echo "marketing_version=${MARKETING_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package app as ZIP
        run: ditto -c -k --keepParent build/Release/PromptQuittung.app PromptQuittung.zip

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: PromptQuittung
          path: PromptQuittung.zip

  # Separate job so `contents: write` is only granted where the release is created.
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: PromptQuittung

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="v${{ needs.build.outputs.marketing_version }}.${{ github.run_number }}"
          gh release create "$TAG" PromptQuittung.zip \
            --title "$TAG" \
            --generate-notes \
            --target "$GITHUB_SHA"
